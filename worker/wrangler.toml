name = "new-music-space-api"
main = "index.js"
compatibility_date = "2026-03-05"
# Required by youtubei.js (the free InnerTube-based stream resolver below) —
# its dependencies expect a few Node built-ins that Workers only provides
# under this flag.
compatibility_flags = ["nodejs_compat"]

# OPTIONAL — makes playlist import bulletproof (official YouTube Data API):
# run this once from this folder, then paste your friend's API key when asked:
#   npx wrangler secret put YT_API_KEY
# Without it, the worker falls back to YouTube's InnerTube API automatically.

[[kv_namespaces]]
binding = "NEW_USER_STORE"
id = "83d63e77649b4cd89449ce0630a8820a"